name: Build and deploy documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      # mkdocstrings imports scLEMBAS to read its docstrings, so the package
      # and its runtime dependencies (including torch) must be installed.
      # The CPU-only torch wheel keeps the install to a few minutes.
      - name: Install torch (CPU-only)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install scLEMBAS and documentation dependencies
        run: |
          pip install -r docs/requirements.txt
          pip install .

      # Not using --strict: mkdocstrings emits warnings for undocumented
      # members and unresolvable cross-references, which would fail the build.
      # Add --strict once the warning output is clean.
      - name: Build site
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
